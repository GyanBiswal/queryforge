services:
  - type: web
    name: queryforge-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: QueryForge
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_MODEL
        value: gemini-2.5-flash-lite
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIMENSIONS
        value: "768"
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "150"
      - key: DATABASE_URL
        value: sqlite:///./queryforge.db
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_data
      - key: SEED_DEMO_DATA
        value: "true"